
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WECIB GACHA</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preload" as="image" href="Images/templates/FreshmanCardTemplate.png">
  <link rel="preload" as="image" href="Images/templates/SophomoreCardTemplate.png">
  <link rel="preload" as="image" href="Images/templates/JuniorCardTemplate.png">
  <link rel="preload" as="image" href="Images/templates/SeniorCardTemplate.png">
  <link rel="preload" as="image" href="Images/templates/Super-SeniorCardTemplate.png">
  <link rel="preload" as="image" href="images/mhsCrate.png">
  <link rel="preload" as="image" href="images/rt1Crate.png">
  <link rel="preload" as="image" href="images/rt2Crate.png">
  <link rel="preload" as="image" href="images/WakeTechCrate (1).png">
</head>
<body>
  <div id="app">
    <nav class="nav-container">
        <div class="nav-pill">
            <a class="nav-link is-active" href="index.html">Case Opener</a>
            <a class="nav-link" href="collection.html">Collection</a>
        </div>
    </nav>

    <header class="hero-grid">
        <section class="hero-banner glow-cyan">
            <p class="eyebrow">WECIBGacha</p>
            <h1>Earnings</h1>
            <div class="hero-accent-left"></div>
            <div class="hero-accent-right"></div>
        </section>

        <div class="stats-column">
            <article class="stat-card glow-cyan">
                <div class="stat-icon-wrap">₿</div>
                <div class="stat-info">
                    <span class="stat-label">PP Balance</span>
                    <strong id="balance">0.00</strong>
                </div>
            </article>
            <article class="stat-card glow-cyan">
                <div class="stat-icon-wrap">🀆</div>
                <div class="stat-info">
                    <span class="stat-label">Collection Size</span>
                    <strong id="inventoryCount">0</strong>
                </div>
            </article>
            <article class="stat-card glow-cyan">
                <div class="stat-icon-wrap">$</div>
                <div class="stat-info">
                    <span class="stat-label">Passive Rate</span>
                    <strong><span id="incomeRate">0.00</span> PP/hr</strong>
                </div>
            </article>
        </div>
    </header>

    <main class="dashboard">
        <section class="panel case-select glow-cyan">
            <div class="panel-header search-controls">
                <h2>Cases</h2>
                <p class="italic-muted">Choose a case to view its pool and open it with PPs.</p>
            </div>
            <div class="cases-grid" id="cases"></div>
        </section>

        <section class="panel opener-section" id="openerSection" hidden>
            <div class="opener-header">
                <h2 id="selectedCaseName"></h2>
                <p id="selectedCaseFlavor" class="case-flavor"></p>
                <div class="price-pill">Price: <span id="selectedCasePrice"></span> PP</div>
            </div>

            <div class="drop-rates-wrap">
                <div class="drop-rates" id="dropRates"></div>
            </div>

            <p class="status-message" id="statusMessage">Pick a case to start opening.</p>

            <div class="roulette-container">
                <div class="roulette-marker"></div>
                <div class="roulette-strip" id="rouletteStrip"></div>
            </div>

            <div class="controls centered-controls">
                <button id="openBtn" class="btn btn-open">Open Case</button>
                <button id="backBtn" class="btn btn-secondary">Back To Cases</button>
            </div>

            <div class="won-item" id="wonItem" hidden>
                <h3>Latest Pull</h3>
                <div class="won-item-card" id="wonItemCard"></div>
            </div>
        </section>
    </main>
</div>
    <button id="trademarkBonus" class="trademark-bonus" type="button" aria-label="Trademark bonus trigger">&trade;</button>
  <script src="storage.js"></script>
  <script src="case.js"></script>
</body>
</html>
