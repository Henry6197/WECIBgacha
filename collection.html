<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WECIB GACHA Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <nav class="nav-container">
        <div class="nav-pill">
            <a class="nav-link" href="index.html">Case Opener</a>
            <a class="nav-link is-active" href="collection.html">Collection</a>
        </div>
    </nav>

    <header class="hero-grid">
        <section class="hero-banner glass-card">
            <p class="eyebrow">WECIBGacha Archive</p>
            <h1>Your collection</h1>
        </section>

        <div class="stats-column">
            <div class="mini-stats-grid">
                <article class="stat-card">
                    <span class="stat-label">PP Balance</span>
                    <strong id="balance">0.00</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Size</span>
                    <strong id="inventoryCount">0</strong>
                </article>
                <article class="stat-card">
                    <span class="stat-label">Rate</span>
                    <strong id="incomeRate">0.00</strong>
                </article>
            </div>

            <section class="rarity-stats-card glass-card">
                <span class="stat-label">Collection Rarity Stats</span>
                <div class="chart-container">
                    <div class="doughnut-chart" id="rarityChart"></div>
                </div>
                <div id="rarityLegend" class="rarity-legend">
                    </div>
            </section>
        </div>
    </header>

    <main class="dashboard">
  <section class="panel collection-section">
    <div class="panel-header search-controls">
      <div class="search-section-left">
        <h2>Collection</h2>
        <div class="search-wrapper">
          <input type="text" id="searchInput" placeholder="Search Collection...">
        </div>
      </div>
      
      <div class="controls-group">
        <select id="rarityFilter" class="filter-select">
          <option value="all">All Rarities</option>
          <option value="freshman">Freshman</option>
          <option value="sophomore">Sophomore</option>
          <option value="junior">Junior</option>
          <option value="senior">Senior</option>
          <option value="superSenior">Super-Senior</option>
        </select>
        
        <select id="dateSort" class="filter-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="rarityDesc">Rarity: High to Low</option>
          <option value="rarityAsc">Rarity: Low to High</option>
          <option value="atkDesc">ATK: High to Low</option>
          <option value="atkAsc">ATK: Low to High</option>
          <option value="defDesc">DEF: High to Low</option>
          <option value="defAsc">DEF: Low to High</option>
          <option value="alpha">A-Z Name</option>
        </select>
        
        <button id="resetProgressBtn" class="btn btn-secondary">Reset</button>
      </div>
    </div>

    <p class="collection-empty" id="collectionEmpty">Open your first case to start building the archive.</p>
    <div class="collection-grid" id="collectionGrid"></div>
  </section>
</main>
</div>
  <script src="storage.js"></script>
  <script src="collection.js"></script>
</body>
</html>
